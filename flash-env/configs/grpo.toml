# GRPO pass (D10/D11): warm-start from the bake-off winner, reward =
# validator gate + gold-action element matching (environment.py grpo_reward).
# Fill init_from_adapter with the winning SFT run-id, then:
#   flash train configs/grpo.toml --cost && flash train configs/grpo.toml --background

model = "Qwen/Qwen3.5-4B"
algorithm = "grpo"
seed = 42

[environment]
id = "ht6-team/agentview"
pip = ["freesolo>=0.2.54", "lxml", "cssselect", "jsonschema"]

[train]
init_from_adapter = "flash-1784388430-882e2acc"
epochs = 1
max_examples = 600
group_size = 6
temperature = 0.7
max_completion_tokens = 2000
learning_rate = 5e-5
batch_size = 4
max_context_tokens = 8192
kl_penalty_coef = 0.05

[train.structured_outputs]
json = "{\"$schema\":\"https://json-schema.org/draft/2020-12/schema\",\"$id\":\"agentview.schema.v1.json\",\"title\":\"AgentView output — schema v1 (FROZEN)\",\"type\":\"object\",\"additionalProperties\":false,\"required\":[\"schema_version\",\"relevant_content\",\"actions\"],\"properties\":{\"schema_version\":{\"const\":\"1\"},\"relevant_content\":{\"type\":\"array\",\"maxItems\":50,\"items\":{\"type\":\"object\",\"additionalProperties\":false,\"required\":[\"id\",\"text\",\"selector\"],\"properties\":{\"id\":{\"type\":\"string\",\"pattern\":\"^c[1-9][0-9]*$\"},\"text\":{\"type\":\"string\",\"minLength\":1,\"maxLength\":500},\"selector\":{\"type\":\"string\",\"minLength\":1,\"maxLength\":300}}}},\"actions\":{\"type\":\"array\",\"maxItems\":30,\"items\":{\"type\":\"object\",\"additionalProperties\":false,\"required\":[\"id\",\"kind\",\"description\",\"target_selector\"],\"properties\":{\"id\":{\"type\":\"string\",\"pattern\":\"^a[1-9][0-9]*$\"},\"kind\":{\"enum\":[\"click\",\"type\",\"select\"]},\"description\":{\"type\":\"string\",\"minLength\":1,\"maxLength\":200},\"target_selector\":{\"type\":\"string\",\"minLength\":1,\"maxLength\":300},\"content_refs\":{\"type\":\"array\",\"maxItems\":10,\"items\":{\"type\":\"string\",\"pattern\":\"^c[1-9][0-9]*$\"}},\"value_hint\":{\"type\":\"string\",\"maxLength\":200}}}}}}"
